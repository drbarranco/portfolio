<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>DR-BIOS // Project Documentation</title>
  <meta name="description" content="Detalles y documentación forense de sistemas de Daniel Rodríguez.">
  <meta name="keywords" content="Daniel Rodríguez, proyectos, arquitectura, bases de datos, API REST">
  <meta name="author" content="Daniel Rodríguez Barranco">

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">
  
  <style>
    /* Estilos específicos para la página de detalles CRT */
    .details-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      padding: 15px;
      background-color: var(--bg-deep);
      overflow-y: auto;
    }
    .details-workspace {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 15px;
      flex-grow: 1;
      margin-bottom: 10px;
    }
    @media (max-width: 991px) {
      .details-workspace {
        grid-template-columns: 1fr;
      }
    }
    .btn-crt-nav {
      background: transparent;
      border: 1px dashed var(--crt-glow);
      color: var(--crt-glow);
      padding: 6px 15px;
      font-family: var(--font-terminal);
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition-fast);
    }
    .btn-crt-nav:hover {
      background: var(--crt-glow);
      color: var(--bg-deep);
      box-shadow: 0 0 10px var(--crt-glow);
    }
    .screenshot-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }
    .gallery-img {
      border: 1px solid var(--crt-border);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition-fast);
      aspect-ratio: 16/10;
    }
    .gallery-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) sepia(0.5) contrast(1.2);
    }
    .gallery-img:hover {
      border-color: var(--crt-glow);
      transform: scale(1.03);
    }
    .gallery-img:hover img {
      filter: none;
    }
  </style>
</head>

<body class="crt-body">
  <!-- CRT Screen overlay -->
  <div class="crt-screen"></div>
  <div class="crt-vignette"></div>

  <div class="details-container">
    
    <!-- HUD Header -->
    <header class="hud-header">
      <div class="hud-title">DR-OS // DECRYPTED_PROJECT_DUMP</div>
      <a href="index.html" class="btn-crt-nav">[ <- BACK_TO_SHELL ]</a>
    </header>

    <!-- Workspace -->
    <div class="details-workspace">
      
      <!-- Columna Izquierda: Ficha Técnica & Capturas -->
      <aside class="hud-sidebar gap-3">
        
        <!-- Ficha -->
        <div class="hud-card">
          <div class="hud-card-header">
            <span class="card-icon">📋</span>
            <span>SYSTEM METADATA</span>
          </div>
          <div class="hud-card-body">
            <ul class="info-list" style="list-style: none; display: flex; flex-direction: column; gap: 8px;" id="project-meta-list">
              <!-- Cargado dinámicamente -->
            </ul>
          </div>
        </div>

        <!-- Capturas de pantalla -->
        <div class="hud-card flex-grow-1">
          <div class="hud-card-header">
            <span class="card-icon">🖼️</span>
            <span>SCREENSHOT_BUFFERS</span>
          </div>
          <div class="hud-card-body">
            <div class="screenshot-gallery" id="project-screenshot-gallery">
              <!-- Cargado dinámicamente -->
            </div>
          </div>
        </div>

      </aside>

      <!-- Columna Derecha: Documentación Técnica Ampliada -->
      <section class="hud-terminal-container">
        <div class="terminal-body" style="background-color: var(--bg-surface); overflow-y: auto;" id="project-docs-body">
          <!-- Cargado dinámicamente -->
        </div>
      </section>

    </div>

    <!-- HUD Footer -->
    <footer class="hud-footer">
      <div class="footer-block">DECRYPT_ENGINE: ACTIVE</div>
      <div class="footer-block">DR-AUDIT_SHELL v2.0</div>
    </footer>

  </div>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>

  <!-- Main Scripts -->
  <script src="assets/js/translations.js"></script>
  <script src="assets/js/projects.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const projectId = params.get("id");
      const project = projects[projectId];
      
      if (!project) {
        window.location.href = "index.html";
        return;
      }

      const lang = localStorage.getItem("lang") || "es";
      const isES = lang === "es";

      // 1. Cargar Ficha Técnica
      const metaList = document.getElementById("project-meta-list");
      const cat = isES ? project.category : project.categoryEn;
      const client = isES ? project.client : project.clientEn;
      
      let metaHTML = `
        <li><strong>[NODE]:</strong> ${project.title}</li>
        <li><strong>[LAYER]:</strong> ${cat}</li>
        <li><strong>[CLIENT]:</strong> ${client}</li>
        <li><strong>[DATES]:</strong> ${project.startDate} - ${project.endDate}</li>
      `;
      if (project.url) {
        metaHTML += `<li><strong>[ONLINE_URL]:</strong> <a href="${project.url}" target="_blank" style="color: var(--crt-glow);">${project.url}</a></li>`;
      }
      if (project.repo) {
        metaHTML += `<li><strong>[SOURCE_CODE]:</strong> <a href="${project.repo}" target="_blank" style="color: var(--crt-glow);">${project.repo}</a></li>`;
      }
      metaList.innerHTML = metaHTML;

      // 2. Cargar Capturas de Pantalla en el buffer
      const gallery = document.getElementById("project-screenshot-gallery");
      gallery.innerHTML = project.images.map(src => `
        <a href="${src}" class="gallery-img glightbox">
          <img src="${src}" alt="Screenshot">
        </a>
      `).join('');

      // Inicializar GLightbox para ampliar imágenes con filtros sepia/CRT
      const lightbox = GLightbox({
        selector: '.glightbox'
      });

      // 3. Inyectar Documentación Técnica en la consola
      const docsBody = document.getElementById("project-docs-body");
      const probTitle = isES ? "01_DEFINICIÓN_DEL_PROBLEMA" : "01_PROBLEM_STATEMENT";
      const probText = isES ? project.problem : project.problemEn;
      
      const archTitle = isES ? "02_ARQUITECTURA_DE_SISTEMAS" : "02_SYSTEMS_ARCHITECTURE";
      const archText = isES ? project.architecture : project.architectureEn;

      const dbTitle = isES ? "03_MODELADO_DE_BASE_DE_DATOS" : "03_DATABASE_SCHEMA";
      const dbText = isES ? project.database : project.databaseEn;

      const apiTitle = isES ? "04_INTEGRACIÓN_API_REST" : "04_REST_API_SPEC";
      const apiText = isES ? project.api : project.apiEn;

      const chalTitle = isES ? "05_RETOS_TÉCNICOS_RESUELTOS" : "05_RESOLVED_CHALLENGES";
      const chalText = isES ? project.challenges : project.challengesEn;

      docsBody.innerHTML = `
        <div class="term-log header">>>> LOAD_DOCUMENTATION_DUMP: ${project.title.toUpperCase()}</div>
        
        <div class="term-log header" style="color: var(--crt-glow);">${probTitle}</div>
        <div class="term-log">${probText}</div>

        <div class="term-log header" style="color: var(--crt-glow);">${archTitle}</div>
        <div class="term-log">${archText}</div>

        <div class="term-log header" style="color: var(--crt-glow);">${dbTitle}</div>
        <div class="term-log" style="white-space: pre-wrap;">${dbText}</div>

        <div class="term-log header" style="color: var(--crt-glow);">${apiTitle}</div>
        <div class="term-log" style="white-space: pre-wrap;">${apiText}</div>

        <div class="term-log header" style="color: var(--crt-glow);">${chalTitle}</div>
        <div class="term-log" style="white-space: pre-wrap;">${chalText}</div>
      `;
    });
  </script>
</body>

</html>
